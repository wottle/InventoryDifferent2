# Production deployment using pre-built images from Docker Hub
# Traefik v1.7 label syntax. For Traefik v2+, see docker-compose.build.yml for v2 label syntax.
#
# Usage:
#   1. Copy .env.example to .env and configure (DOMAIN, SHOP_DOMAIN, passwords, etc.)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# To update: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Traefik v1.7 running with external network "web" and ACME configured in static config
#   - DNS configured for DOMAIN and SHOP_DOMAIN

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - invdif_prod_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKERHUB_USER:-wottle}/inventory-api:latest
    pull_policy: always
    container_name: inventory-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inventory}
      PORT: 4000
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${DOMAIN};PathPrefix:/graphql,/upload,/uploads,/import,/export,/auth,/ai-image,/settings"
      - "traefik.port=4000"
      - "traefik.frontend.priority=2"
      - "traefik.docker.network=web"
      - "traefik.frontend.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.frontend.headers.accessControlAllowHeaders=Content-Type,Authorization"
      - "traefik.frontend.headers.accessControlAllowOrigin=https://${DOMAIN}"

  web:
    image: ${DOCKERHUB_USER:-wottle}/inventory-web:latest
    pull_policy: always
    container_name: inventory-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LANGUAGE: ${LANGUAGE:-en}
      API_URL: http://api:4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      UMAMI_URL: ${UMAMI_URL:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEB_WEBSITE_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${DOMAIN}"
      - "traefik.port=3000"
      - "traefik.frontend.priority=1"
      - "traefik.docker.network=web"

  storefront:
    image: ${DOCKERHUB_USER:-wottle}/inventory-storefront:latest
    pull_policy: always
    container_name: inventory-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CONTACT_EMAIL: ${CONTACT_EMAIL:-store@example.com}
      UMAMI_URL: ${UMAMI_URL:-}
      UMAMI_STOREFRONT_WEBSITE_ID: ${UMAMI_STOREFRONT_WEBSITE_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${SHOP_DOMAIN}"
      - "traefik.port=3001"
      - "traefik.docker.network=web"

  # Showcase site (optional — public editorial showcase for the collection)
  # showcase:
  #   image: ${DOCKERHUB_USER:-wottle}/inventory-showcase:latest
  #   pull_policy: always
  #   container_name: inventory-showcase
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     API_URL: http://api:4000
  #     AUTH_PASSWORD: ${AUTH_PASSWORD:-}
  #     JWT_SECRET: ${JWT_SECRET:-}
  #     LANGUAGE: ${LANGUAGE:-en}
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   networks:
  #     - internal
  #     - web
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.frontend.rule=Host:${SHOWCASE_DOMAIN}"
  #     - "traefik.port=3000"
  #     - "traefik.docker.network=web"

  # MCP server (optional — only needed for AI assistant integration)
  # mcp-server:
  #   image: ${DOCKERHUB_USER:-wottle}/inventory-mcp:latest
  #   pull_policy: always
  #   container_name: inventory-mcp
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgres://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inventory}
  #     PORT: 3002
  #     MCP_TOKEN: ${MCP_TOKEN:-}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - internal
  #     - web
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.frontend.rule=Host:mcp.${DOMAIN}"
  #     - "traefik.port=3002"
  #     - "traefik.docker.network=web"

networks:
  internal:
    driver: bridge
  web:
    external: true

volumes:
  invdif_prod_postgres_data:
