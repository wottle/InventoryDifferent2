name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: inventory_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run Prisma migrations
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: api
        env:
          TEST_DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
          DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
          JWT_SECRET: ci-test-secret
          AUTH_PASSWORD: testpassword
          AUTH_USERNAME: admin
        run: npm test

  mcp-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: inventory_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Install API dependencies (for Prisma schema)
        working-directory: api
        run: npm ci

      - name: Run Prisma migrations
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: mcp-server
        env:
          TEST_DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
          DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
        run: npm test

  web-tests:
    name: Web Component Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Start services
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 5

      - name: Build API
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5433/inventory_test
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run prisma:seed
          npm run build

      - name: Start API
        working-directory: api
        run: |
          DATABASE_URL=postgresql://postgres:testpass@localhost:5433/inventory_test \
          AUTH_PASSWORD=testpassword \
          JWT_SECRET=ci-test-secret \
          PORT=4000 \
          node dist/src/index.js &

          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/auth/status > /dev/null 2>&1; then
              echo "API is ready"
              curl -s http://localhost:4000/auth/status
              break
            fi
            echo "Waiting for API... ($i)"
            sleep 1
          done

      - name: Build and start web
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: |
          npm ci
          npm run build
          npx next start -p 3000 &
          sleep 3

      - name: Build and start storefront
        working-directory: storefront
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: |
          npm ci
          npm run build
          npx next start -p 3001 &
          sleep 3

      - name: Run Playwright tests
        env:
          AUTH_PASSWORD: testpassword
          CI: true
        run: ./node_modules/.bin/playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
