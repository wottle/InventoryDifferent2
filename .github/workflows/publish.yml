name: Publish Docker Images

# Builds and pushes multi-arch images to Docker Hub after tests pass on main.
#
# Required GitHub secrets:
#   DOCKERHUB_TOKEN   — Docker Hub access token (Account Settings → Security)
#

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Build and Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        include:
          - name: API
            context: ./api
            image: wottle/inventory-api
          - name: Web
            context: ./web
            image: wottle/inventory-web
          - name: Storefront
            context: ./storefront
            image: wottle/inventory-storefront
          - name: MCP Server
            context: ./mcp-server
            image: wottle/inventory-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wottle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image }}:latest
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
