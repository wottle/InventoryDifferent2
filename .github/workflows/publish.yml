name: Publish Docker Images

# Builds and pushes multi-arch images to Docker Hub after tests pass on main.
#
# Required GitHub secrets:
#   DOCKERHUB_TOKEN   — Docker Hub access token (Account Settings → Security)
#

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wottle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: wottle/inventory-api:latest

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: wottle/inventory-web:latest

      - name: Build and push Storefront
        uses: docker/build-push-action@v5
        with:
          context: ./storefront
          platforms: linux/amd64,linux/arm64
          push: true
          tags: wottle/inventory-storefront:latest

      - name: Build and push MCP Server
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: wottle/inventory-mcp:latest
