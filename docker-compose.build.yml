# Build-from-source deployment with Traefik v1.7
# Use this if you want to build images locally rather than pull from Docker Hub.
# For the standard pre-built image deployment see docker-compose.prod.yml.
#
# Usage:
#   1. Copy .env.example to .env and configure
#   2. docker compose -f docker-compose.build.yml up -d --build
#
# Prerequisites:
#   - Traefik v1.7 running with external network "web" and ACME configured in static config
#   - DNS configured for your domains

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: inventory-api:latest
    container_name: inventory-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inventory}
      PORT: 4000
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
      - ${SQL_PATH:-./}category.sql:/app/category.sql:ro
      - ${SQL_PATH:-./}device_templates.sql:/app/device_templates.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${DOMAIN};PathPrefix:/graphql,/upload,/uploads,/import,/export,/auth,/generate-image"
      - "traefik.port=4000"
      - "traefik.frontend.priority=2"
      - "traefik.docker.network=web"
      - "traefik.frontend.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.frontend.headers.accessControlAllowHeaders=Content-Type,Authorization"
      - "traefik.frontend.headers.accessControlAllowOrigin=https://${DOMAIN}"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
    image: inventory-web:latest
    container_name: inventory-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LANGUAGE: ${LANGUAGE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - api
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${DOMAIN}"
      - "traefik.port=3000"
      - "traefik.frontend.priority=1"
      - "traefik.docker.network=web"

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    image: inventory-storefront:latest
    container_name: inventory-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CONTACT_EMAIL: ${CONTACT_EMAIL:-store@example.com}
    depends_on:
      - api
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.frontend.rule=Host:${SHOP_DOMAIN}"
      - "traefik.port=3001"
      - "traefik.docker.network=web"

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    image: inventory-mcp:latest
    container_name: inventory-mcp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inventory}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
  web:
    external: true

volumes:
  postgres_data:
